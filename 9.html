<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abyssland Mobile Seller</title>
    <style>
        /* (same beautiful CSS as before - unchanged) */
        :root { --primary-color: #007bff; --secondary-color: #00d2ff; --text-dark: #333; --text-light: #fff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background: linear-gradient(135deg, #141e30 0%, #243b55 100%); background-attachment: fixed; color: var(--text-dark); display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: rgba(0,0,0,0.8); backdrop-filter: blur(10px); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(to right, #00d2ff, #3a7bd5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
        nav a { color: white; text-decoration: none; margin-left: 25px; font-size: 1.05rem; font-weight: 500; transition: color 0.3s, transform 0.2s; cursor: pointer; }
        nav a:hover { color: #00d2ff; transform: translateY(-2px); }
        .page-section { display: none; padding: 3rem 2rem; max-width: 1200px; margin: auto; flex-grow: 1; width: 100%; box-sizing: border-box; }
        .active-page { display: block; animation: slideFadeIn 0.6s cubic-bezier(0.16,1,0.3,1); }
        @keyframes slideFadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .hero { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.05); backdrop-filter: blur(15px); border-radius: 20px; padding: 40px; border: 1px solid rgba(255,255,255,0.1); color: white; box-shadow: 0 15px 35px rgba(0,0,0,0.2); gap: 40px; }
        .hero-text h1 { font-size: 3.5rem; background: linear-gradient(to right, #ffffff, #00d2ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-image-container { flex: 1; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .image-placeholder { background: #f8f9fa; border: 3px dashed #ccc; border-radius: 15px; height: 220px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .image-placeholder img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
        .product-grid { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .product-card { background: rgba(255,255,255,0.95); padding: 25px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.15); width: calc(33.333% - 30px); min-width: 280px; text-align: center; transition: all 0.4s ease; }
        .product-card:hover { transform: translateY(-12px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .btn { background: linear-gradient(to right, #007bff, #00d2ff); color: white; border: none; padding: 12px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; }
        .category-filters { text-align: center; margin-bottom: 30px; display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; }
        .page-header { color: white; text-align: center; font-size: 2.5rem; margin-bottom: 40px; }
        @media (max-width: 768px) { .product-card { width: 100%; } .hero { flex-direction: column-reverse; } }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="navigateTo('home')">Abyssland</div>
        <nav>
            <a onclick="navigateTo('home')">Home</a>
            <a onclick="navigateTo('shop')">Shop</a>
            <a onclick="navigateTo('about')">About</a>
            <a onclick="navigateTo('contact')">Contact Us</a>
            <a id="nav-login" onclick="navigateTo('login')">Login / Register</a>
            <a id="nav-signout" onclick="handleSignOut()" style="display:none; color:#ff6b6b;">Sign Out</a>
        </nav>
    </header>

    <main id="home" class="page-section active-page">
        <div class="hero">
            <div class="hero-text">
                <h1>Next-Gen Mobile Technology.</h1>
                <p>Welcome to Abyssland Mobile Seller. Discover the latest smartphones and unbeatable deals.</p>
                <button class="btn" onclick="navigateTo('shop')">Explore Devices</button>
            </div>
            <div class="hero-image-container">
                <img src="1775322451327.png" alt="Hero" style="max-width:400px; border-radius:20px;">
            </div>
        </div>
    </main>

    <main id="shop" class="page-section">
        <h1 class="page-header">Our Devices</h1>
        <div class="category-filters">
            <button onclick="filterProducts('all')" class="btn active" data-category="all">All Devices</button>
            <button onclick="filterProducts('samsung')" class="btn" data-category="samsung">Samsung</button>
            <button onclick="filterProducts('apple')" class="btn" data-category="apple">Apple</button>
            <button onclick="filterProducts('google')" class="btn" data-category="google">Google Pixel</button>
        </div>
        <div id="product-grid" class="product-grid"></div>
    </main>

    <!-- Other pages (checkout, about, contact, login) are kept but shortened for brevity -->
    <!-- (You can keep your original ones - they are unchanged) -->

    <script>
        let products = [
            { name: "Galaxy S24 Ultra", category: "samsung", price: "$1,199", imageSrc: "https://fdn2.gsmarena.com/vv/bigpic/samsung-galaxy-s24-ultra.jpg" },
            { name: "Galaxy S24", category: "samsung", price: "$799", imageSrc: "https://fdn2.gsmarena.com/vv/bigpic/samsung-galaxy-s24.jpg" },
            { name: "Galaxy Z Fold6", category: "samsung", price: "$1,799", imageSrc: "https://fdn2.gsmarena.com/vv/bigpic/samsung-galaxy-z-fold6.jpg" },
            { name: "iPhone 15 Pro Max", category: "apple", price: "$1,199", imageSrc: "https://fdn2.gsmarena.com/vv/bigpic/apple-iphone-15-pro-max.jpg" },
            { name: "iPhone 16 Pro", category: "apple", price: "$999", imageSrc: "https://fdn2.gsmarena.com/vv/bigpic/apple-iphone-16-pro.jpg" },
            { name: "iPhone 16 Pro Max", category: "apple", price: "$1,199", imageSrc: "https://fdn2.gsmarena.com/vv/bigpic/apple-iphone-16-pro-max.jpg" },
            { name: "Google Pixel 8 Pro", category: "google", price: "$999", imageSrc: "https://fdn2.gsmarena.com/vv/bigpic/google-pixel-8-pro.jpg" },
            { name: "Google Pixel 9 Pro", category: "google", price: "$999", imageSrc: "https://fdn2.gsmarena.com/vv/bigpic/google-pixel-9-pro.jpg" },
            { name: "Google Pixel 8a", category: "google", price: "$499", imageSrc: "https://fdn2.gsmarena.com/vv/bigpic/google-pixel-8a.jpg" }
        ];

        function renderProducts(filtered) {
            console.log("✅ Rendering products...");   // ← DEBUG
            const grid = document.getElementById('product-grid');
            grid.innerHTML = filtered.map(p => `
                <div class="product-card">
                    <div class="image-placeholder">
                        <img src="\( {p.imageSrc}" alt=" \){p.name}">
                    </div>
                    <h3>${p.name}</h3>
                    <p><strong>${p.price}</strong></p>
                    <button class="btn" onclick="buyProduct('\( {p.name}', ' \){p.price}')">Go to Cart</button>
                </div>
            `).join('');
        }

        function filterProducts(cat) {
            let filtered = cat === 'all' ? products : products.filter(p => p.category === cat);
            renderProducts(filtered);
            document.querySelectorAll('.category-filters button').forEach(b => b.classList.toggle('active', b.getAttribute('data-category') === cat));
        }

        function navigateTo(page) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active-page'));
            document.getElementById(page).classList.add('active-page');
            if (page === 'shop') filterProducts('all');
        }

        function buyProduct(name, price) {
            alert(`Added to cart: ${name} - ${price}\n(Checkout page would open here)`);
        }

        // Quick init
        window.onload = () => {
            console.log("🚀 Page loaded - rendering shop");
            renderProducts(products);
        };
    </script>
</body>
</html>
